<!DOCTYPE html>
<html>
<head>
	<title>Contact Me</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<style>
		body {
			margin: 0;
			padding: 0;
			font-family: Arial, sans-serif;
		}

		header {
			background-color: #333;
			color: white;
			padding: 10px;
			text-align: center;
		}

		h1 {
			margin: 0;
			font-size: 36px;
			font-weight: bold;
			letter-spacing: 2px;
			text-transform: uppercase;
		}

		nav {
			background-color: #ddd;
			padding: 10px;
		}

		nav ul {
			list-style-type: none;
			margin: 0;
			padding: 0;
			overflow: hidden;
		}

		nav li {
			float: left;
		}

		nav li a {
			display: block;
			color: #333;
			text-align: center;
			padding: 14px 16px;
			text-decoration: none;
		}

		nav li a:hover {
			background-color: #333;
			color: white;
		}

		section {
			padding: 50px;
		}

		footer {
			background-color: #333;
			color: white;
			padding: 10px;
			text-align: center;
		}

		.contact-list {
			list-style-type: none;
			padding: 0;
		}

		.contact-list li {
			margin-bottom: 20px;
		}

		.contact-list li a {
			display: inline-block;
			color: #333;
			text-decoration: none;
			padding-left: 35px;
			position: relative;
		}

		.contact-list li a:before {
			content: "";
			position: absolute;
			left: 0;
			top: 50%;
			transform: translateY(-50%);
			width: 30px;
			height: 30px;
			border-radius: 50%;
			background-color: #333;
			color: white;
			line-height: 30px;
			text-align: center;
		}

		.contact-list li a:hover:before {
			opacity: 0.7;
		}

		.email:before {
			content: "\f0e0";
			font-family: "FontAwesome";
		}

		.linkedin:before {
			content: "\f08c";
			font-family: "FontAwesome";
		}

		.fa-github:before {
			content: "\f09b";
			font-family: "FontAwesome";
		}
	</style>
</head>
<body>
	<header>
		<nav>
			<ul>
				<li><a href="index.html">Home</a></li>
				<li><a href="about.html">About</a></li>
				<li><a href="#">Portfolio</a></li>
				<li><a href="contact.html">Contact</a></li>
			</ul>
		</nav>
	</header>
	<main>
		<h1>Contact Me</h1>
		<p>You can reach me by:</p>
		<ul class="contact-list">
			<li><a href="mailto:BenL25846@gmail.com" class="email">BenL25846@gmail.com</a></li>
			<li><a href="https://www.linkedin.com/in/benjamlee/" class="linkedin">LinkedIn</a></li>
			<li><a href="#" class="fa fa-github"></a></li>
		</ul>
	</main>
</body>
</html>
