<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<style>
		body {
			margin: 0;
			padding: 0;
			font-family: Arial, sans-serif;
		}

		header {
			background-color: #333;
			color: white;
			padding: 10px;
			text-align: center;
		}

		h1 {
			margin: 0;
			font-size: 36px;
			font-weight: bold;
			letter-spacing: 2px;
			text-transform: uppercase;
		}

		nav {
			background-color: #ddd;
			padding: 10px;
		}

		nav ul {
			list-style-type: none;
			margin: 0;
			padding: 0;
			overflow: hidden;
		}

		nav li {
			float: left;
		}

		nav li a {
			display: block;
			color: #333;
			text-align: center;
			padding: 14px 16px;
			text-decoration: none;
		}

		nav li a:hover {
			background-color: #333;
			color: white;
		}

		section {
			padding: 50px;
		}

		footer {
			background-color: #333;
			color: white;
			padding: 10px;
			text-align: center;
		}

		.fa {
			padding: 10px;
			font-size: 30px;
			width: 50px;
			text-align: center;
			text-decoration: none;
			margin: 5px 2px;
			border-radius: 50%;
		}

		.fa:hover {
			opacity: 0.7;
		}

		.fa-linkedin {
			background: #007bb5;
			color: white;
		}

		.fa-github {
			background: #333;
			color: white;
		}
	</style>
    <title>Benjamin Lee's Portfolio</title>
  </head>
  <body>
    <h1>My Portfolio</h1>
    <p>Welcome to my portfolio! Below you can find a link to view my portfolio in PDF format.</p>
    <a href="https://github.com/ze11ow/benjamSite/main/blob/Benjamin_Lee_MASTER_Project_Portfolio.pdf" target="_blank">View PDF Portfolio</a>
  </body>
</html>
